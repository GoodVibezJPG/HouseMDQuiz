<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="includes/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="includes/script.js"></script>
    <title>Bootstrap demo</title>
</head>
<body>
<main>
    <section id="quizSection">
        <div id="quizContainer" class="container bg-danger rounded">
            <div id="quizTitle" class="text-center">
                <h1>House MD Quiz</h1>
                <h3>Everybody Lies</h3>
                <h5 id="quizTimer">0:00</h5>
                <hr>
            </div>
            <div id="quizGreeting">
                <h1 class="fs-1">HULLO</h1>
                <p id="playerInputLabel" class="fs-3">What's your name?</p>
                <div class="input-group mb-3">
                    <input id="quizPlayer" type="text" class="form-control" placeholder="Recipient's username" aria-label="Recipient's username" aria-describedby="basic-addon2">
                    <button id="startQuizBtn" class="btn btn-outline-secondary" type="button">Button</button>
                </div>
            </div>
            <div id="quizContent">
                <h4 id="chosenQuizName">Good luck</h4>
            </div>
        </div>
    </section>
</main>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</html>
